<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wilson Pauta Jr. | Private Bartender NYC</title>

  <style>
    :root {
      --ink: #1a1a1a;
      --paper: #faf8f5;
      --accent: #8c2f1b;
      --muted: #6b6b6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .hero h1 {
      font-size: 2.4rem;
      line-height: 1.1;
    }
    .hero .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin-top: 12px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 28px 0;
    }
    .badge {
      border: 1px solid var(--ink);
      padding: 6px 14px;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
    }

    /* Bigger button: more padding + larger text = easier thumb target */
    .contact-btn {
      display: block;
      background: var(--accent);
      color: var(--paper);
      text-align: center;
      text-decoration: none;
      padding: 24px;
      font-size: 1.4rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      margin: 32px 0;
    }

    footer {
      margin-top: 56px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Wilson Pauta Jr.</h1>
    <p class="tagline">Professional private bartending for parties and events in NYC.</p>
  </div>

  <!-- Certifications -->
  <div class="badges">
    <span class="badge">NYS ATAP Certified</span>
    <span class="badge">English / Español</span>
    <span class="badge">10 Years Hospitality</span>
  </div>

  <!-- Sits directly under the certifications, sized up -->
  <a class="contact-btn" href="mailto:wpauta25@gmail.com?subject=Bartending%20Inquiry">
    Request a Quote
  </a>

  <footer>
    <p>Wilson Pauta Jr. &middot; NYC &middot; wpauta25@gmail.com</p>
  </footer>

</body>
</html>
